<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
</h:head>
<h:body>
    <div class="header">
        <div class="container">
            <h2>Report List</h2>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div class="action-bar">
                <p:link outcome="/reportNew.xhtml"
                        value="Add"
                        styleClass="p-button p-button-success p-button-raised" />
            </div>
        </div>
        <h:form>
            <p:dataTable value="#{reportListBean.reports}"
                         var="report"
                         styleClass="p-datatable-striped"
                         paginator="true"
                         rows="10"
                         emptyMessage="No Data Found">
                <p:column headerText="Title" sortBy="#{report.title}">
                    <h:outputText value="#{report.title}" />
                </p:column>
            </p:dataTable>
        </h:form>
    </div>
</h:body>
</html>
