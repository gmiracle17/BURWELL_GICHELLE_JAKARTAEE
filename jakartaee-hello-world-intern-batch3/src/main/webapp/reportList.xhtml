<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Report List</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
        :root {
            --ink-900: #1a2332;
            --ink-800: #263344;
            --ink-600: #4a5a70;
            --ink-400: #8494a8;
            --ink-200: #dde3ea;
            --ink-100: #eef1f5;
            --surface: #ffffff;
            --bg: #f2f4f7;
            --accent: #3b6ef6;
            --accent-dark: #2c56cf;
            --success: #16a34a;
            --success-dark: #128a3e;
            --danger: #e0374a;
            --danger-dark: #c22a3b;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 7px;
            --shadow-sm: 0 1px 3px rgba(20, 30, 45, 0.06), 0 1px 2px rgba(20, 30, 45, 0.08);
            --shadow-md: 0 4px 14px rgba(20, 30, 45, 0.08);
            --shadow-lift: 0 8px 20px rgba(20, 30, 45, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--ink-800);
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(120deg, var(--ink-900) 0%, var(--ink-800) 55%, #33455e 100%);
            color: #ffffff;
            padding: 30px 0;
            box-shadow: 0 4px 16px rgba(20, 30, 45, 0.15);
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: "";
            position: absolute;
            top: -60%;
            right: -5%;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(59, 110, 246, 0.25), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .header .subtitle {
            margin-top: 4px;
            font-size: 13.5px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.65);
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--ink-100);
            padding: 18px 22px;
            margin: 28px 0 20px 0;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .add-button {
            background: linear-gradient(135deg, var(--success), var(--success-dark)) !important;
            border: none !important;
            padding: 11px 26px !important;
            font-size: 14.5px !important;
            font-weight: 600 !important;
            letter-spacing: 0.2px;
            box-shadow: 0 3px 10px rgba(22, 163, 74, 0.3) !important;
            transition: transform 0.18s ease, box-shadow 0.18s ease !important;
            border-radius: var(--radius-md) !important;
            color: #ffffff !important;
        }

        .add-button:hover {
            box-shadow: 0 6px 16px rgba(22, 163, 74, 0.4) !important;
            transform: translateY(-2px);
        }

        .add-button:active {
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--ink-200);
            box-shadow: var(--shadow-sm);
        }

        .empty-state .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink-600);
            margin-bottom: 4px;
        }

        .empty-state .empty-subtitle {
            font-size: 13.5px;
            color: var(--ink-400);
        }

        /* ---------- Data table ---------- */
        .ui-datatable {
            border-radius: var(--radius-lg) !important;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--ink-100);
        }

        .ui-datatable-tablewrapper table {
            border-collapse: collapse;
            width: 100%;
        }

        .ui-datatable thead th {
            background: linear-gradient(180deg, var(--ink-800), var(--ink-900)) !important;
            color: #ffffff !important;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            padding: 14px 18px !important;
            border: none !important;
        }

        .ui-datatable tbody td {
            padding: 14px 18px !important;
            border-bottom: 1px solid var(--ink-100) !important;
            font-size: 14.5px;
            color: var(--ink-800);
            vertical-align: middle;
        }

        .ui-datatable tbody tr {
            background-color: var(--surface) !important;
            transition: background-color 0.15s ease;
        }

        .ui-datatable tbody tr.ui-datatable-odd,
        .ui-datatable tbody tr.p-datatable-row-odd {
            background-color: #fafbfc !important;
        }

        .ui-datatable tbody tr:hover {
            background-color: #eef4ff !important;
        }

        .ui-datatable tbody tr:last-child td {
            border-bottom: none !important;
        }

        /* Paginator polish */
        .ui-paginator {
            padding: 12px !important;
            background: var(--surface) !important;
            border-top: 1px solid var(--ink-100) !important;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .edit-btn,
        .delete-btn {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-sizing: border-box !important;
            width: 84px !important;
            height: 34px !important;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            line-height: 1 !important;
            border-radius: var(--radius-sm) !important;
            transition: all 0.18s ease !important;
            vertical-align: middle;
            text-decoration: none !important;
        }

        .edit-btn {
            background: var(--surface) !important;
            border: 1px solid var(--ink-200) !important;
            color: var(--ink-800) !important;
        }

        .edit-btn:hover {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: #ffffff !important;
            box-shadow: 0 3px 8px rgba(59, 110, 246, 0.3) !important;
            transform: translateY(-1px);
        }

        .delete-btn {
            background: var(--surface) !important;
            border: 1px solid #f6c6cb !important;
            color: var(--danger) !important;
        }

        .delete-btn:hover {
            background: var(--danger) !important;
            border-color: var(--danger) !important;
            color: #ffffff !important;
            box-shadow: 0 3px 8px rgba(224, 55, 74, 0.35) !important;
            transform: translateY(-1px);
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 640px) {
            .container { padding: 0 14px; }
            .header { padding: 22px 0; }
            .header h2 { font-size: 21px; }
            .action-buttons { flex-direction: column; gap: 6px; }
            .ui-datatable tbody td, .ui-datatable thead th { padding: 10px 12px !important; }
        }
    </style>
</h:head>
<h:body>

    <div class="header">
        <div class="container">
            <h2>Report List</h2>
            <div class="subtitle">Browse, edit, and manage your reports</div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="action-bar">
                <p:link outcome="/reportNew.xhtml"
                        value="+ Add Report"
                        styleClass="p-button p-button-success p-button-raised add-button" />
            </div>
        </div>

        <h:form>
            <h:panelGroup rendered="#{empty reportListBean.reports}">
                <div class="empty-state">
                    <div class="empty-title">No reports yet</div>
                    <div class="empty-subtitle">Click "Add Report" above to create your first one.</div>
                </div>
            </h:panelGroup>

            <p:dataTable value="#{reportListBean.reports}"
                         var="report"
                         styleClass="p-datatable-striped"
                         paginator="true"
                         rows="10"
                         rendered="#{not empty reportListBean.reports}">
                <p:column headerText="Title" sortBy="#{report.title}">
                    <h:outputText value="#{report.title}" />
                </p:column>
                <p:column headerText="Details" sortBy="#{report.title}">
                    <h:outputText value="#{report.detail}" />
                </p:column>
                <p:column headerText="Actions" style="width: 180px; text-align: center;">
                    <div class="action-buttons">
                        <p:link outcome="/reportEdit.xhtml"
                                value="Edit"
                                styleClass="p-button edit-btn">
                            <f:param name="id" value="#{report.id}" />
                        </p:link>
                        <p:commandButton value="Delete"
                                         ajax="true"
                                         action="#{reportListBean.deleteReport(report)}"
                                         update="@form"
                                         styleClass="delete-btn"
                                         onclick="return confirm('Are you sure you want to delete this report?');">
                            <p:ajax update="@form" />
                        </p:commandButton>
                    </div>
                </p:column>
            </p:dataTable>
        </h:form>
    </div>

</h:body>
</html>
