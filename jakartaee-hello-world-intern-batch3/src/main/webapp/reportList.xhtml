<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Report List</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style type="text/css">
        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #ffffff;
            padding: 24px 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            padding: 16px 20px;
            margin: 24px 0 16px 0;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
        }

        .ui-datatable {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .ui-datatable-tablewrapper table {
            border-collapse: collapse;
            width: 100%;
        }

        .ui-datatable thead th {
            background-color: #2c3e50 !important;
            color: #ffffff !important;
            font-weight: 600;
            padding: 12px 16px !important;
        }

        .ui-datatable tbody td {
            padding: 12px 16px !important;
            border-bottom: 1px solid #eaeaea !important;
        }

        .ui-datatable tbody tr:hover {
            background-color: #f1f5f9 !important;
        }

        .add-button {
            background: linear-gradient(135deg, #4CAF50, #45a049) !important;
            border-color: #4CAF50 !important;
            padding: 10px 24px !important;
            font-size: 15px !important;
            font-weight: 700 !important;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3) !important;
            transition: all 0.3s ease !important;
            border-radius: 10px;
            color: white !important;
        }

        .add-button:hover {
            background: linear-gradient(135deg, #45a049, #3d8b40) !important;
            border-color: #45a049 !important;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4) !important;
            transform: translateY(-2px);
        }

        .delete-btn {
            background-color: #e74c3c !important;
            border-color: #e74c3c !important;
            padding: 6px 16px !important;
            font-size: 13px !important;
            border-radius: 4px !important;
            transition: all 0.3s ease !important;
        }

        .delete-btn:hover {
            background-color: #c0392b !important;
            border-color: #c0392b !important;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.4) !important;
        }
    </style>
</h:head>
<h:body>

    <div class="header">
        <div class="container">
            <h2>Report List</h2>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="action-bar">
                <p:link outcome="/reportNew.xhtml"
                        value="Add Report"
                        styleClass="p-button p-button-success p-button-raised add-button" />
            </div>
        </div>

        <h:form>
            <h:panelGroup rendered="#{empty reportListBean.reports}">
                <div style="text-align: center; padding: 40px; color: #7f8c8d; font-size: 16px;">
                    No Data Found
                </div>
            </h:panelGroup>
            
            <p:dataTable value="#{reportListBean.reports}"
                         var="report"
                         styleClass="p-datatable-striped"
                         paginator="true"
                         rows="10"
                         rendered="#{not empty reportListBean.reports}">
                <p:column headerText="Title" sortBy="#{report.title}">
                    <h:outputText value="#{report.title}" />
                </p:column>
                <p:column headerText="Details" sortBy="#{report.title}">
                    <h:outputText value="#{report.detail}" />
                </p:column>
                <p:column headerText="Actions" style="width: 120px; text-align: center;">
                    <p:commandButton value="Delete"
                                     ajax="true"
                                     action="#{reportListBean.deleteReport(report)}"
                                     update="@form"
                                     styleClass="delete-btn"
                                     onclick="return confirm('Are you sure you want to delete this report?');">
                        <p:ajax update="@form" />
                    </p:commandButton>
                </p:column>
            </p:dataTable>
        </h:form>
    </div>

</h:body>
</html>
